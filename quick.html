<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quick Sort</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        header{
            background:#4a90e2;
            color:white;
            text-align:center;
            padding:25px;
        }

        .heading-bar{
            width:120px;
            height:5px;
            background:white;
            margin:15px auto;
            border-radius:10px;
        }

        .card{
            width:400px;
            background:white;
            margin:60px auto;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card-icon{
            font-size:55px;
            margin-bottom:15px;
        }

        h2{
            color:#4a90e2;
            margin-bottom:15px;
        }

        p{
            margin-bottom:15px;
            line-height:1.6;
        }

        a{
            text-decoration:none;
            background:#4a90e2;
            color:white;
            padding:10px 18px;
            border-radius:8px;
        }

    </style>
</head>

<body>

    <header>
        <h1>Quick Sort</h1>
        <div class="heading-bar"></div>
    </header>

    <div class="card">

        <div class="card-icon">⚡</div>

        <h2>About Quick Sort</h2>

        <p>
            Quick Sort selects a pivot element and divides the array into smaller parts.
        </p>

        <p><b>Example:</b> 9 4 7 2 6</p>

        <p><b>After Sorting:</b> 2 4 6 7 9</p>

        <a href="index.html">← Back</a>

    </div>

</body>
</html>
