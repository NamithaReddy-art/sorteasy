<!DOCTYPE html>
<html>
<head>
<title>Comparison Tool</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

input{
    width:350px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
}

button{
    padding:12px 20px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.container{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-top:30px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:15px;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #374151;
    padding:12px;
}

th{
    background:#0077ff;
}

.home-btn{
    display:inline-block;
    margin-top:20px;
    background:#0077ff;
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
}

</style>
</head>

<body>

<h1>Sorting Comparison Tool</h1>

<input type="text" id="numbers" placeholder="5,3,8,1,2">

<button onclick="compareSorts()">Compare</button>

<div class="container">

<div class="box">
<h2>Bubble Sort</h2>
<p id="bubbleResult">-</p>
</div>

<div class="box">
<h2>Quick Sort</h2>
<p id="quickResult">-</p>
</div>

<div class="box">
<h2>Bubble Time</h2>
<p id="bubbleTime">-</p>
</div>

<div class="box">
<h2>Quick Time</h2>
<p id="quickTime">-</p>
</div>

</div>

<table>

<tr>
<th>Algorithm</th>
<th>Best</th>
<th>Average</th>
<th>Worst</th>
</tr>

<tr>
<td>Bubble Sort</td>
<td>O(n)</td>
<td>O(n²)</td>
<td>O(n²)</td>
</tr>

<tr>
<td>Quick Sort</td>
<td>O(n log n)</td>
<td>O(n log n)</td>
<td>O(n²)</td>
</tr>

</table>

<a href="index.html" class="home-btn">⬅ Back Home</a>

<script>

function bubbleSort(arr){

let a=[...arr];

for(let i=0;i<a.length;i++){

for(let j=0;j<a.length-i-1;j++){

if(a[j]>a[j+1]){

let temp=a[j];
a[j]=a[j+1];
a[j+1]=temp;

}

}

}

return a;

}

function quickSort(arr){

if(arr.length<=1){
return arr;
}

let pivot=arr[arr.length-1];

let left=[];
let right=[];

for(let i=0;i<arr.length-1;i++){

if(arr[i]<pivot){
left.push(arr[i]);
}

else{
right.push(arr[i]);
}

}

return [...quickSort(left),pivot,...quickSort(right)];

}

function compareSorts(){

let arr=document.getElementById("numbers").value
.split(",")
.map(Number);

let startBubble=performance.now();

let bubble=bubbleSort(arr);

let endBubble=performance.now();

let startQuick=performance.now();

let quick=quickSort(arr);

let endQuick=performance.now();

document.getElementById("bubbleResult").innerHTML=
bubble.join(" → ");

document.getElementById("quickResult").innerHTML=
quick.join(" → ");

document.getElementById("bubbleTime").innerHTML=
(endBubble-startBubble).toFixed(4)+" ms";

document.getElementById("quickTime").innerHTML=
(endQuick-startQuick).toFixed(4)+" ms";

}

</script>

</body>
</html>
