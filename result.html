<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
    background: #a7d8f0;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 600px;
    text-align: center;
}

.grid {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.box {
    width: 45%;
    background: #f1f1f1;
    padding: 10px;
    border-radius: 8px;
}

.winner {
    background: #d4edda;
}

.loser {
    background: #f8d7da;
}

/* 🔹 BACK BUTTON CENTERED BOX */
.back-container {
    margin-top: 25px;
}

.back-box {
    background: #f1f1f1;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
}

.back-btn {
    display: inline-block;
    padding: 10px 25px;
    background: #ff6b6b;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.back-btn:hover {
    background: #e55050;
}
</style>

</head>
<body>

<div class="container">

<h2>Result</h2>

<div class="grid">

<div class="box {% if faster == 'Bubble Sort' %}winner{% else %}loser{% endif %}">
    <h3>Bubble Sort</h3>
    <p>Sorted: {{ bubble }}</p>
    <p>Time: {{ bubble_time }} sec</p>
    <p>Complexity: O(n²)</p>
</div>

<div class="box {% if faster == 'Quick Sort' %}winner{% else %}loser{% endif %}">
    <h3>Quick Sort</h3>
    <p>Sorted: {{ quick }}</p>
    <p>Time: {{ quick_time }} sec</p>
    <p>Complexity: O(n log n)</p>
</div>

</div>

<h3>Faster: {{ faster }}</h3>
<h4>Best: Quick Sort</h4>

<!-- 🔥 CENTERED BACK BUTTON -->
<div class="back-container">
    <div class="back-box">
        <a href="/" class="back-btn">Back</a>
    </div>
</div>

</div>

</body>
</html>
